<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RailOps Loco Numbers Only</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  background:#071222;
  color:#eaf2ff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
body{padding:24px}
.card{
  background:linear-gradient(180deg,#102039,#0d1a2f);
  border:1px solid #274569;
  border-radius:22px;
  padding:24px;
  max-width:920px;
  margin:auto;
  box-shadow:0 16px 36px rgba(0,0,0,.25);
}
h1{
  margin:0 0 12px;
  font-size:clamp(32px,6vw,56px);
  line-height:1.05;
}
p{
  color:#9fb3d3;
  font-size:20px;
  line-height:1.45;
}
.pill{
  display:inline-block;
  background:#113f2d;
  border:1px solid #2f8f61;
  border-radius:999px;
  padding:10px 14px;
  margin:6px 6px 6px 0;
  font-weight:800;
}
</style>
</head>
<body>
<div class="card">
  <h1>RailOps Loco Numbers Only</h1>
  <span class="pill">Database reset</span>
  <span class="pill">Started: 1/5/2026 20:00 Adelaide time</span>
  <p>No loco numbers yet. The next Railway cron run will rebuild this from the next good scrape.</p>
</div>
</body>
</html>
