name: Fast Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  fast-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run fast scraper
        env:
          DISPLAY: :99
          TF_USERNAME: ${{ secrets.TF_USERNAME }}
          TF_PASSWORD: ${{ secrets.TF_PASSWORD }}
        run: |
          echo "=== RUNNING fast_scraper.py ==="
          python fast_scraper.py

      - name: Update loco database
        run: |
          echo "=== RUNNING update_locos.py ==="
          python update_locos.py

      - name: Export loco download files
        run: |
          echo "=== RUNNING export_locos_to_excel.py ==="
          python export_locos_to_excel.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            trains.json \
            debug_sources.json \
            cookie.txt \
            trainfinder_cookies.pkl \
            locos.json \
            loco_history.json \
            loco_export.csv \
            loco_summary.txt \
            static/downloads/loco_database.xlsx \
            static/downloads/loco_numbers_only.xlsx \
            static/downloads/loco_database.html \
            static/downloads/recently_added.html \
            static/downloads/loco_numbers_only.html \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update trains and loco database files"
            git push
          fi
