name: Refresh TrainFinder Cookie

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  refresh-cookie:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run cookie refresh
        env:
          TF_USERNAME: ${{ secrets.TF_USERNAME }}
          TF_PASSWORD: ${{ secrets.TF_PASSWORD }}
        run: |
          python refresh_cookie.py

      - name: Commit updated cookie files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cookie.txt trainfinder_cookies.pkl 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No cookie changes to commit."
          else
            git commit -m "Refresh TrainFinder cookie"
            git push
          fi
