name: Refresh TrainFinder Cookie

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  refresh-cookie:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests beautifulsoup4

      - name: Run TrainFinder cookie refresh
        env:
          TF_USERNAME: ${{ secrets.TF_USERNAME }}
          TF_PASSWORD: ${{ secrets.TF_PASSWORD }}
        run: |
          python refresh_cookie.py

      - name: Commit refreshed cookie files
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cookie.txt trainfinder_cookies.json trainfinder_cookies.pkl

          if git diff --cached --quiet; then
            echo "No cookie changes to commit"
          else
            git commit -m "Refresh TrainFinder cookie"
            git push
          fi

      - name: Upload TrainFinder debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trainfinder-debug
          path: debug_trainfinder/
