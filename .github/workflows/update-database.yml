name: Update RailOps Database

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: railops-database-update
  cancel-in-progress: false

jobs:
  update-database:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start virtual display
        run: |
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run existing scraper if present
        env:
          TRAINFINDER_COOKIE: ${{ secrets.TRAINFINDER_COOKIE }}
          TRAINFINDER_COOKIE_RAW: ${{ secrets.TRAINFINDER_COOKIE_RAW }}
          TF_USERNAME: ${{ secrets.TF_USERNAME }}
          TF_PASSWORD: ${{ secrets.TF_PASSWORD }}
          TF_UA: ${{ secrets.TF_UA }}
          PROXYMESH_PASSWORD: ${{ secrets.PROXYMESH_PASSWORD }}
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          set -e

          if [ -f "update_trains.py" ]; then
            echo "Running update_trains.py"
            python update_trains.py
          elif [ -f "fast_scraper.py" ]; then
            echo "Running fast_scraper.py"
            python fast_scraper.py
          else
            echo "No scraper script found. Skipping scrape step."
          fi

      - name: Generate loco database files
        run: |
          python railops_loco_database.py

      - name: Show generated files
        run: |
          echo "Root files:"
          ls -lah *.json *.csv *.txt || true

          echo "Downloads:"
          ls -lah static/downloads || true

      - name: Commit database files back to GitHub
        run: |
          git config user.name "RailOps Bot"
          git config user.email "railops-bot@users.noreply.github.com"

          git add trains.json || true
          git add live_trains.json || true
          git add locos.json || true
          git add loco_history.json || true
          git add loco_export.csv || true
          git add loco_summary.txt || true
          git add blocklist.json || true
          git add static/downloads/loco_database.html || true
          git add static/downloads/recently_added.html || true
          git add static/downloads/loco_numbers_only.html || true
          git add static/downloads/loco_database.xlsx || true
          git add static/downloads/loco_numbers_only.xlsx || true

          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update RailOps database files"
            git pull --rebase
            git push
          fi